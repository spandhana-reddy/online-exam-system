<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Administrator Entrance</title>
    <style>
        body { font-family: Arial, sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.3); width: 320px; }
        h2 { margin-top: 0; color: #2c3e50; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #e74c3c; border: none; color: white; border-radius: 4px; cursor: pointer; font-size: 16px; }
        button:hover { background: #c0392b; }
        p { text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Admin Portal</h2>
        <form action="/admin/login" method="POST">
            <input type="text" name="username" placeholder="Admin Username" required>
            <input type="password" name="password" placeholder="Master Password" required>
            <button type="submit">Authorize</button>
        </form>
        <p><a href="/" style="color: #34495e; text-decoration: none;">&larr; Back to Student Login</a></p>

        <p style="font-size:14px;">Need another profile? <a href="/admin/register" style="color: #e74c3c; text-decoration: none;">Register Admin Here</a></p>
    </div>
</body>
</html>
